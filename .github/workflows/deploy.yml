name: 3-Tier Deploy via SSM
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
env:
  AWS_REGION:  ap-northeast-2
  S3_BUCKET:   intg-lab-deploy-${{ secrets.AWS_ACCOUNT_ID }}
  ASG_NAME:    intg-lab-asg
  DEPLOY_DIR:  /var/www/html
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
 
      # 배포 버전 자동 주입 + S3 업로드
      - name: Package & S3 upload
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          sed -i "s|배포 버전: [^<]*|배포 버전: ${SHORT_SHA}|g" frontend/index.html || true
          zip -r deploy-${GITHUB_SHA}.zip . --exclude '*.git*' --exclude '.github/*'
          aws s3 cp deploy-${GITHUB_SHA}.zip s3://${S3_BUCKET}/releases/deploy-${GITHUB_SHA}.zip
          aws s3 cp deploy-${GITHUB_SHA}.zip s3://${S3_BUCKET}/releases/deploy-latest.zip
 
      # ASG InService 인스턴스 조회
      - name: Get instances
        id: inst
        run: |
          IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names ${ASG_NAME} \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text | tr '\t' ' ')
          echo "ids=${IDS}" >> $GITHUB_OUTPUT
 
      # SSM Rolling 배포
      - name: SSM deploy
        run: |
          for IID in ${{ steps.inst.outputs.ids }}; do
            CMD=$(aws ssm send-command --instance-ids $IID \
              --document-name AWS-RunShellScript \
              --parameters 'commands=[
                aws s3 cp s3://'${S3_BUCKET}'/releases/deploy-latest.zip /tmp/d.zip,
                unzip -o /tmp/d.zip -d '${DEPLOY_DIR}',
                nginx -t && systemctl reload nginx,
                curl -sf http://localhost]' \
              --timeout-seconds 300 \
              --query Command.CommandId --output text)
            for i in $(seq 1 30); do
              sleep 10
              ST=$(aws ssm get-command-invocation \
                --command-id $CMD --instance-id $IID \
                --query Status --output text 2>/dev/null || echo Pending)
              [ "$ST" = Success ] && break
              [ "$ST" = Failed ] && exit 1
            done
            echo "✅ $IID 완료"
          done
